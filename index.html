<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGR472 Lab 4</title>
    <!-- mapbox API -->
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js'></script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css' rel='stylesheet' />
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Turf.js -->
    <script src='https://unpkg.com/@turf/turf@7.2.0/turf.min.js'></script>
</head>

<body>
    <!-- Add map title and subtitle to explain the topic and it's importance -->
    <h1 class="title">Drive Safe.</h1>
    <p class="subtitle_1">Over 4000 roadside collisions occurred in Toronto between 2016-2021. <br> Of those, 590 were fatal. You never know when you or a loved one's life may be irreparably altered. Please make
        smart decisions.</p>

    <!-- MAP CONTAINER -->
    <div id='map' class='map'></div>

    <!-- Add a change hexagon size menu for fun! -->
    <div class="form-group hex-size">
        <label for="hex-size-toggle" class="dropdown-title">Hexagon Size:</label>
        <select id="hex-size-toggle" class="form-control" onchange="changeHexSize(value)">
            <option value="Medium">Medium (500m)</option>
            <option value="Large">LARGE (1000m)</option>
        </select>
    </div>

    <!-- Add filtering by different types of collisions to the map -->
    <div class="form-group filter">
        <label for="month-filter" class="dropdown-title">Filter Collisions By :</label>
        <select id="month-filter" class="form-control" onchange="updateMap(value)">
            <option value="All">All</option>
            <option value="Alcohol Involved">Alcohol Involved</option>
            <option value="Fatal">Fatal</option>
        </select>
    </div>

    <!-- Add layer toggle functionality -->
    <div id="layer_toggle">
        <h4 class="text-center"> Display Layers </h4>
        <label>
            <input type="checkbox" value="collision-hex-polygon" onchange="toggleLayer(value)" checked>
            Hex Grid
        </label><br>
        <label>
            <input type="checkbox" value="tor-collision-point" onchange="toggleLayer(value)" checked>
            Collision Points
        </label><br>
    </div>

    <!-- Add legend -->
    <div id='legend' class='legend'>
        <h3 class="legend-title" id="legend-title">Number of Road Collisions</h3>
    </div>

    <script src="js/script.js"></script>

</body>

</html>
